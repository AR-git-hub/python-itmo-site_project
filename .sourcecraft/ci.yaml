on:
  push:
    workflows: build-and-deploy
    filter:
      branches: main

workflows:
  build-and-deploy:
    tasks:
      - name: build
        cubes:
          - name: setup-python
            image: python:3.13
            script:
              - pip install -r requirements.txt
              - mkdocs build --config-file source/mkdocs.yml
              - git checkout -b release || git checkout release
              - rm -rf ./*
              - cp -r site/* .
              - git add .
              - git commit -m "Deploy site [skip ci]" || echo "Nothing to commit"
              - git push origin release -f