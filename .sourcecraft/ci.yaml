on:
  push:
    workflows: build-and-deploy
    filter:
      branches: main

workflows:
  build-and-deploy:
    tasks:
      - name: build
        cubes:
          - name: setup-python
            image: python:3.13
            script:
              - pip install -r requirements.txt
              - mkdocs build --config-file source/mkdocs.yml
              - ls -la site   # для проверки
            artifacts:
              paths:
                - site